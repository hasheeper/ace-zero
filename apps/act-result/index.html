<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACE0 MACRO RESOLUTION</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=JetBrains+Mono:wght@400;700;800&family=Noto+Serif+SC:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
  <body>
  <div class="mech-widget">
    <div class="widget-header">
      <div class="header-tag"><div class="record-dot"></div> FATE_AUDIT</div>
      <div class="header-status" id="ui-top-status">执行更新</div>
    </div>
    <div class="widget-body">

      <!-- ★ 第一层：微缩战术时钟轴 -->
      <div class="phase-gauge-casing" id="ui-tracker-time" style="display:none;">
        <div class="gauge-badge">
          <span>PRESENT</span>
          <div id="mini-time-title">DAY 00</div>
        </div>
        <div class="gauge-track" id="mini-time-axis"></div>
      </div>

      <!-- ★ 第二层：节点执行相 -->
      <div class="phase-tracker" id="ui-tracker-node" style="display:none;"></div>

      <!-- ★ 第三层：[ 地理面板 | Loot 列表 ] 各占一半 -->
      <div class="strata-loot-row">
      <div class="strata-casing" id="ui-tracker-strata" style="display:none;">
        <div class="strata-axis">
          <div class="axis-text">NADIR · ZENITH</div>
        </div>
        <div class="strata-vaults" id="strata-vaults">
          <div class="vault-anchor" id="strata-anchor" style="top: 158px;"></div>

          <div class="vault-row layer-court" data-idx="3" data-color="#dce3eb">
            <div class="row-top">
              <div class="vault-id">IV ✦ THE COURT</div>
              <div class="vault-name-inline">上庭层</div>
            </div>
            <div class="row-bottom">
              <div class="vault-name-large">上庭层</div>
              <div class="vault-site"></div>
            </div>
          </div>

          <div class="vault-row layer-exchange" data-idx="2" data-color="#c2b173">
            <div class="row-top">
              <div class="vault-id">III ✦ THE EXCHANGE</div>
              <div class="vault-name-inline">中市层</div>
            </div>
            <div class="row-bottom">
              <div class="vault-name-large">中市层</div>
              <div class="vault-site"></div>
            </div>
          </div>

          <div class="vault-row layer-street" data-idx="1" data-color="#828a96">
            <div class="row-top">
              <div class="vault-id">II ✦ THE STREET</div>
              <div class="vault-name-inline">下街层</div>
            </div>
            <div class="row-bottom">
              <div class="vault-name-large">下街层</div>
              <div class="vault-site"></div>
            </div>
          </div>

          <div class="vault-row layer-rust" data-idx="0" data-color="#d94e4e">
            <div class="row-top">
              <div class="vault-id">I ✦ THE RUST</div>
              <div class="vault-name-inline">底锈层</div>
            </div>
            <div class="row-bottom">
              <div class="vault-name-large">底锈层</div>
              <div class="vault-site"></div>
            </div>
          </div>
        </div>
      </div>

        <div class="loot-container" id="ui-loot-list"></div>
      </div>

      <!-- 总结框区 -->
      <div class="log-viewport" id="ui-log-port">
        <div class="log-bracket top-left"></div>
        <div class="log-bracket bottom-right"></div>
        <p class="summary-text" id="ui-summary">读取世界线参数...</p>
      </div>

      <div class="route-panel" id="ui-route-panel" style="display:none;"></div>
    </div>
  </div>

  <script id="ace0-raw" type="application/json">$1</script>
  <script src="./app.js"></script>
</body>
</html>
