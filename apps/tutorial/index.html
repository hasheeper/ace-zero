<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ace Zero Tutorial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=JetBrains+Mono:wght@400;700&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/logo/acezero-logo.css">
  <style>
    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #07080c;
      color: #f4e7bf;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 50% 18%, rgba(207, 181, 59, 0.14), transparent 34%),
        linear-gradient(180deg, #11131a 0%, #06070a 100%);
    }

    main {
      width: min(760px, 100%);
      border: 1px solid rgba(207, 181, 59, 0.22);
      background: rgba(10, 11, 15, 0.94);
      box-shadow: 0 32px 88px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      padding: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
      border-bottom: 1px solid rgba(207, 181, 59, 0.18);
      padding-bottom: 20px;
    }

    .az-logo {
      --az-logo-scale: 0.28;
    }

    .kicker {
      margin: 0 0 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(207, 181, 59, 0.72);
    }

    h1 {
      margin: 0;
      font-family: "Noto Serif SC", serif;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1.1;
      letter-spacing: 0;
      color: #fff2c8;
    }

    .subtitle {
      margin: 12px 0 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
      line-height: 1.8;
      color: rgba(244, 231, 191, 0.72);
    }

    .section-label {
      margin: 24px 0 12px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(207, 181, 59, 0.7);
    }

    .options {
      display: grid;
      gap: 12px;
    }

    button {
      width: 100%;
      border: 1px solid rgba(207, 181, 59, 0.18);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015));
      color: inherit;
      padding: 18px 20px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(207, 181, 59, 0.38);
      background: linear-gradient(180deg, rgba(207, 181, 59, 0.1), rgba(207, 181, 59, 0.04));
    }

    .option-title {
      display: block;
      font-family: "Noto Serif SC", serif;
      font-size: 21px;
      color: #fff2c8;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .option-desc {
      display: block;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      line-height: 1.7;
      color: rgba(244, 231, 191, 0.68);
    }

    .back {
      width: auto;
      margin-bottom: 14px;
      padding: 10px 14px;
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
    }

    .error {
      color: #ff8b8b;
      font-family: "JetBrains Mono", monospace;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <div>
        <p class="kicker">ACE ZERO TUTORIAL</p>
        <h1 id="title">教程入口</h1>
        <p class="subtitle" id="subtitle">Loading...</p>
      </div>
      <div class="az-logo" data-acezero-logo></div>
    </div>
    <div id="view"></div>
  </main>

  <script src="../../assets/logo/acezero-logo.js"></script>
  <script>
    (async function () {
      'use strict';

      const INDEX_PATH = '../../content/tutorials/texas-holdem/tutorial-index.json';
      const titleEl = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');
      const viewEl = document.getElementById('view');

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function openGame(params) {
        const message = {
          type: 'acezero-open-app',
          app: 'game',
          params: {
            gameMode: 'texas-holdem',
            sessionMode: 'tutorial',
            tutorialConfigPath: params.configPath,
            tutorialProfile: params.profileId,
            tutorialCourse: params.courseId,
            tutorialLauncherPath: 'content/tutorials/texas-holdem/tutorial-index.json'
          }
        };

        try {
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(message, '*');
            return;
          }
        } catch (_) {}

        const target = new URL('../../index.html', location.href);
        target.searchParams.set('app', 'game');
        Object.entries(message.params).forEach(([key, value]) => {
          if (value) target.searchParams.set(key, value);
        });
        location.href = target.href;
      }

      function renderCourses(indexConfig, profile) {
        const courses = Array.isArray(profile && profile.courses) ? profile.courses : [];
        titleEl.textContent = profile.label || '选择课程阶段';
        subtitleEl.textContent = profile.description || '';
        viewEl.innerHTML = [
          '<button class="back" type="button" id="back-btn">返回</button>',
          '<div class="section-label">选择课程阶段</div>',
          '<div class="options"></div>'
        ].join('');

        viewEl.querySelector('#back-btn').addEventListener('click', () => renderProfiles(indexConfig));
        const optionsEl = viewEl.querySelector('.options');
        courses.forEach((course) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.innerHTML = [
            '<span class="option-title">' + escapeHtml(course.label || course.id || '课程') + '</span>',
            '<span class="option-desc">' + escapeHtml(course.description || '') + '</span>'
          ].join('');
          btn.addEventListener('click', () => {
            openGame({
              profileId: profile.id || '',
              courseId: course.id || '',
              configPath: course.configPath
            });
          });
          optionsEl.appendChild(btn);
        });
      }

      function renderProfiles(indexConfig) {
        const profiles = Array.isArray(indexConfig.profiles) ? indexConfig.profiles : [];
        titleEl.textContent = indexConfig.title || '选择教程入口';
        subtitleEl.textContent = indexConfig.subtitle || '';
        viewEl.innerHTML = [
          '<div class="section-label">选择玩家类型</div>',
          '<div class="options"></div>'
        ].join('');

        const optionsEl = viewEl.querySelector('.options');
        profiles.forEach((profile) => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.innerHTML = [
            '<span class="option-title">' + escapeHtml(profile.label || profile.id || '教程入口') + '</span>',
            '<span class="option-desc">' + escapeHtml(profile.description || '') + '</span>'
          ].join('');
          btn.addEventListener('click', () => renderCourses(indexConfig, profile));
          optionsEl.appendChild(btn);
        });
      }

      try {
        const response = await fetch(INDEX_PATH, { cache: 'no-cache' });
        if (!response.ok) throw new Error('HTTP ' + response.status);
        const indexConfig = await response.json();
        renderProfiles(indexConfig);
      } catch (error) {
        titleEl.textContent = '教程入口不可用';
        subtitleEl.textContent = '';
        viewEl.innerHTML = '<div class="error">Failed to load tutorial index: ' + escapeHtml(error && error.message || error) + '</div>';
      }
    })();
  </script>
</body>
</html>
