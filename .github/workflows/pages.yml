name: Validate static app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run deterministic validation suite
        run: |
          set -euo pipefail
          node scripts/validate.mjs ci

      - name: Check required static entries
        run: |
          set -euo pipefail
          required_files=(
            index.html
            registry/apps.json
            registry/games.json
            apps/game/index.html
            apps/tutorial/index.html
            apps/dashboard/index.html
            apps/act-result/index.html
            apps/st-bridge/bridge.js
            assets/riichi-mahjong-tiles/Regular/Man5.svg
            assets/deck-of-cards/dist/deck.js
          )
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required static file: $file"
              exit 1
            fi
            echo "OK $file"
          done
