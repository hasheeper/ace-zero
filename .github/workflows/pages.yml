name: Validate static app

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    name: Validate static app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Validate JSON
        run: |
          set -euo pipefail
          node -e "for (const f of ['registry/apps.json','registry/games.json','apps/st-bridge/manifest.json','content/game-config.json','content/tutorials/texas-holdem/tutorial-index.json']) JSON.parse(require('fs').readFileSync(f,'utf8'));"

      - name: Validate JavaScript syntax
        run: |
          set -euo pipefail
          node --check apps/game/runtime/data-loader.js
          node --check apps/st-bridge/bridge.js
          node --check apps/st-bridge/packs/acezero-main/dashboard/loader.js
          node --check games/majiang/frontend/scripts/app-entry.js
          node --check games/texasholdem/texas-holdem/texas-holdem.js

      - name: Check required static entries
        run: |
          set -euo pipefail
          required_files=(
            index.html
            registry/apps.json
            registry/games.json
            apps/game/index.html
            apps/tutorial/index.html
            apps/dashboard/index.html
            apps/act-result/index.html
            apps/st-bridge/bridge.js
            assets/riichi-mahjong-tiles/Regular/Man5.svg
            assets/deck-of-cards/dist/deck.js
          )
          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "::error::Missing required static file: $file"
              exit 1
            fi
            echo "OK $file"
          done
